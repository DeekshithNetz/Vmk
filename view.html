<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Blogs</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f4f5f7;
      color: #1a1a2e;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    nav {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid #e2e4e9; padding: 0 16px;
    }
    .nav-top {
      display: flex; align-items: center; justify-content: space-between; height: 52px;
    }
    .nav-top .logo { font-weight: 700; font-size: 18px; color: #1a1a2e; }
    .hamburger {
      background: none; border: none; font-size: 20px;
      color: #1a1a2e; cursor: pointer; padding: 4px;
    }
    .nav-links {
      display: none; flex-direction: column;
      background: #fff; border-bottom: 1px solid #e2e4e9; padding: 4px 0 12px;
    }
    .nav-links.open { display: flex; }
    .nav-links a {
      display: flex; align-items: center; gap: 10px;
      padding: 11px 16px; text-decoration: none; color: #444;
      font-size: 14px; font-weight: 500; border-radius: 8px;
      margin: 2px 8px; transition: background .15s;
    }
    .nav-links a:active, .nav-links a:hover { background: #f0f1f3; }
    .nav-links a i { width: 18px; text-align: center; font-size: 15px; color: #777; }

    .page-header {
      padding: 20px 16px 0;
      max-width: 600px; margin: 0 auto;
    }
    .page-title { font-size: 20px; font-weight: 700; }

    .container {
      padding: 16px; max-width: 600px; margin: 0 auto;
      display: flex; flex-direction: column; gap: 14px;
    }
    .card {
      background: #fff; border-radius: 12px; overflow: hidden;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
      cursor: pointer; transition: transform .12s;
    }
    .card:active { transform: scale(0.985); }
    .card img {
      width: 100%; height: 170px; object-fit: cover; display: block;
    }
    .card-body { padding: 14px; }
    .card-body h3 {
      font-size: 15px; font-weight: 600; margin-bottom: 4px; line-height: 1.4;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-date { font-size: 11px; color: #999; margin-bottom: 6px; }
    .card-excerpt {
      font-size: 13px; color: #666; line-height: 1.5; margin-bottom: 6px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .card-tags { font-size: 11px; color: #888; }
    .card-actions {
      display: flex; gap: 8px; margin-top: 12px;
      padding-top: 10px; border-top: 1px solid #f0f1f3;
    }
    .card-actions button {
      flex: 1; padding: 8px; border: none; border-radius: 8px;
      font-size: 12px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: opacity .15s;
    }
    .card-actions button:active { opacity: .8; }
    .btn-edit { background: #e8f5e9; color: #2e7d32; }
    .btn-delete { background: #fbe9e7; color: #c62828; }

    .empty {
      text-align: center; padding: 60px 20px; color: #999;
    }
    .empty i { font-size: 40px; margin-bottom: 12px; display: block; color: #ccc; }
    .empty p { font-size: 14px; }

    /* ── Pagination ── */
    .pagination {
      display: flex; align-items: center; justify-content: center;
      gap: 12px; padding: 20px 16px;
      max-width: 600px; margin: 0 auto;
    }
    .pagination button {
      padding: 10px 20px; border: 1.5px solid #dde0e5;
      border-radius: 10px; background: #fff; color: #444;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer; transition: all .15s;
      display: flex; align-items: center; gap: 6px;
    }
    .pagination button:active { transform: scale(0.95); }
    .pagination button:disabled {
      opacity: .3; cursor: default; transform: none;
    }
    .page-info {
      font-size: 13px; font-weight: 500; color: #888;
      min-width: 60px; text-align: center;
    }

    /* ── Modal ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.4);
      z-index: 300; display: none; align-items: center; justify-content: center;
      padding: 24px;
    }
    .modal-overlay.show { display: flex; }
    .modal-box {
      background: #fff; border-radius: 14px; padding: 24px;
      width: 100%; max-width: 320px; text-align: center;
    }
    .modal-box p { font-size: 14px; color: #333; margin-bottom: 20px; line-height: 1.5; }
    .modal-btns { display: flex; gap: 10px; }
    .modal-btns button {
      flex: 1; padding: 10px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600; font-family: inherit; cursor: pointer;
    }
    .modal-cancel { background: #f0f1f3; color: #555; }
    .modal-confirm { background: #c62828; color: #fff; }

    /* ── Toast ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #1a1a2e; color: #fff; padding: 12px 24px;
      border-radius: 10px; font-size: 14px; font-weight: 500;
      opacity: 0; transition: all .3s ease; z-index: 200; white-space: nowrap;
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
      #loader {
  position: fixed;
  inset: 0;
  background: rgba(255, 255, 255, 0.6);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

      #loader::after {
  content: "";
  width: 45px;
  height: 45px;
  border: 5px solid #3b82f6; /* blue */
  border-top-color: transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to {
    transform: rotate(360deg);
  }
}

  </style>
</head>
<body>

<nav>
  <div class="nav-top">
    <div class="logo">MyBlog</div>
    <button class="hamburger" onclick="document.querySelector('.nav-links').classList.toggle('open')">
      <i class="fas fa-bars"></i>
    </button>
  </div>
  <div class="nav-links">
    <a href="create.html"><i class="fas fa-plus"></i>Create Blog</a>
    <a href="view.html"><i class="fas fa-eye"></i>View Blog</a>
    <a href="achievement.html"><i class="fas fa-trophy"></i>Achievement</a>
    <a href="dashboard.html"><i class="fas fa-chart-pie"></i>Dashboard</a>
  </div>
</nav>

<div class="page-header">
  <div class="page-title">Blog Posts</div>
</div>
<div id="loader"></div>
<div class="container" id="posts"></div>

<div class="pagination" id="pagination">
  <button id="prevBtn" onclick="prevPage()">
    <i class="fas fa-chevron-left"></i> Prev
  </button>
  <span class="page-info" id="pageInfo"></span>
  <button id="nextBtn" onclick="nextPage()">
    Next <i class="fas fa-chevron-right"></i>
  </button>
</div>

<!-- Delete Modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal-box">
    <p>Delete this post? This cannot be undone.</p>
    <div class="modal-btns">
      <button class="modal-cancel" onclick="closeModal()">Cancel</button>
      <button class="modal-confirm" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div class="toast" id="toast">Deleted</div>

<script>
    function showLoader() {
    document.getElementById("loader").style.display = "flex";
  }

  function hideLoader() {
    document.getElementById("loader").style.display = "none";
  }
  
const API = "https://vmk.onrender.com";
let page = 1;
const limit = 6;
let deleteTargetId = null;

document.querySelectorAll('.nav-links a').forEach(a => {
  a.addEventListener('click', () => {
    document.querySelector('.nav-links').classList.remove('open');
  });
});

function closeModal() {
  document.getElementById('deleteModal').classList.remove('show');
  deleteTargetId = null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => t.classList.remove('show'), 2000);
}

async function load() {
showLoader();
  const res = await fetch(`${API}/posts?page=${page}&limit=${limit}`);
  const result = await res.json();
  hideLoader();
  
  

  const container = document.getElementById('posts');
  container.innerHTML = "";

  const posts = result.data;

  // ── Fix: determine if next page exists ──
  // If API returns total/meta, use that. Otherwise check if we got fewer than limit.
  const totalPages = result.total_pages || result.last_page || null;
  const total = result.total || null;
  const hasMore = totalPages
    ? page < totalPages
    : (posts && posts.length === limit);

  const hasNext = hasMore;
  const hasPrev = page > 1;

  document.getElementById('prevBtn').disabled = !hasPrev;
  document.getElementById('nextBtn').disabled = !hasNext;

  if (total) {
    document.getElementById('pageInfo').textContent = `${page} / ${totalPages || Math.ceil(total / limit)}`;
  } else {
    document.getElementById('pageInfo').textContent = `Page ${page}`;
  }

  if (!posts || posts.length === 0) {
    container.innerHTML = `
      <div class="empty">
        <i class="fas fa-file-circle-plus"></i>
        <p>No posts yet</p>
      </div>`;
    document.getElementById('pagination').style.display = 'none';
    return;
  }

  document.getElementById('pagination').style.display = 'flex';

  posts.forEach(p => {
    const div = document.createElement('div');
    div.className = 'card';
    div.innerHTML = `
      <img src="${p.thumbnail || 'https://placehold.co/600x340/e2e4e9/999?text=No+Image'}" />
      <div class="card-body">
        <h3>${p.title}</h3>
        <div class="card-date">${new Date(p.created_at).toLocaleString()}</div>
        <div class="card-excerpt">${p.excerpt || ''}</div>
        <div class="card-tags">${p.tags ? '<i class="fas fa-tag" style="margin-right:4px"></i>' + p.tags : ''}</div>
        <div class="card-actions">
          <button class="btn-edit"><i class="fas fa-pen" style="margin-right:4px"></i>Edit</button>
          <button class="btn-delete"><i class="fas fa-trash" style="margin-right:4px"></i>Delete</button>
        </div>
      </div>`;

    div.addEventListener('click', () => {
      window.location.href = `post.html?id=${p.id}`;
    });

    div.querySelector('.card-actions').addEventListener('click', e => e.stopPropagation());

    div.querySelector('.btn-edit').onclick = e => {
      e.stopPropagation();
      window.location.href = `edit.html?id=${p.id}`;
    };

    div.querySelector('.btn-delete').onclick = e => {
      e.stopPropagation();
      deleteTargetId = p.id;
      document.getElementById('deleteModal').classList.add('show');
    };

    container.appendChild(div);
  });
}

async function nextPage() {
  const nextBtn = document.getElementById('nextBtn');
  if (nextBtn.disabled) return;
  page++;
  load();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function prevPage() {
  const prevBtn = document.getElementById('prevBtn');
  if (prevBtn.disabled) return;
  page--;
  load();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('confirmDelete').onclick = async () => {
showLoader();
  if (!deleteTargetId) return;
  await fetch(`${API}/posts/${deleteTargetId}`, { method: 'DELETE' });
  closeModal();
  hideLoader();
  showToast('Deleted');
  load();
};

load();
</script>
</body>
</html>
